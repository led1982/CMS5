spring:
  application:
    name: cms5
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cms}
    username: ${SPRING_DATASOURCE_USERNAME:cms}
    password: ${SPRING_DATASOURCE_PASSWORD:cms}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

cms:
  storage:
    upload-dir: ${CMS_UPLOAD_DIR:/var/cms/uploads}
  security:
    local-demo-tokens: true
  cors:
    allowed-origins: ${CMS_CORS_ALLOWED_ORIGINS:http://localhost:5173}
