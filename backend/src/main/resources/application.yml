server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: internal-cms
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cms}
    username: ${SPRING_DATASOURCE_USERNAME:cms}
    password: ${SPRING_DATASOURCE_PASSWORD:cms}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  security:
    default-user-email: ${APP_DEFAULT_USER_EMAIL:employee@example.com}
  attachments:
    upload-dir: ${APP_UPLOAD_DIR:/var/cms/uploads}
