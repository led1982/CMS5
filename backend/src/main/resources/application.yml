spring:
  application:
    name: cms-backend
  profiles:
    default: local
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
                include: health,info

cms:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
