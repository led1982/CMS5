services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cms
      POSTGRES_USER: cms
      POSTGRES_PASSWORD: cms
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms -d cms"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cms
      SPRING_DATASOURCE_USERNAME: cms
      SPRING_DATASOURCE_PASSWORD: cms
      CMS_CORS_ALLOWED_ORIGINS: http://localhost:8088
      CMS_UPLOAD_DIR: /var/cms/uploads
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/var/cms/uploads
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "8088:80"

volumes:
  postgres-data:
  uploads:
